name: Deploy Quartz Site

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
      - name: Show Node Version
        run: |
          node -v
          npm -v
          npx -v
      
      - name: Install Dependencies
        run: npm ci

      - name: Install Quartz plugins
        run: npx quartz plugin install

      - name: Verify content
        run: |
          if [ ! -d content ] || [ "$(find content -name '*.md' | wc -l | tr -d ' ')" -eq 0 ]; then
            echo "No markdown files found in content/. Commit your vault content before deploying."
            exit 1
          fi

      - name: Build Quartz
        run: npx quartz build

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
# yaml-language-server: $schema=./quartz/plugins/quartz-plugins.schema.json
configuration:
  pageTitle: "The Royal Archives of Veyr"
  pageTitleSuffix: ""
  enableSPA: true
  enablePopovers: true
  analytics:
    provider: plausible
  locale: en-US
  baseUrl: mysote.github.io
  ignorePatterns:
    - private
    - templates
    - .obsidian
    - "**/GM/**"
    - "Campaign Bible/**"
    - "**/*Cheat Sheet*"
    - "**/_*"
  theme:
    fontOrigin: googleFonts
    cdnCaching: true
    typography:
      header: Cinzel
      body: Crimson Text
      code: IBM Plex Mono
    colors:
      lightMode:
        light: "#ebe4d4"
        lightgray: "#d4c9b0"
        gray: "#8f8268"
        darkgray: "#4d4538"
        dark: "#2a2418"
        secondary: "#8f7328"
        tertiary: "#4a5d47"
        highlight: rgba(74, 93, 71, 0.14)
        textHighlight: "#c9a84a88"
      darkMode:
        light: "#1c1f18"
        lightgray: "#2a2e24"
        gray: "#7d8a6e"
        darkgray: "#c9be9f"
        dark: "#e8dfc8"
        secondary: "#c9a65a"
        tertiary: "#6b8f62"
        highlight: rgba(107, 143, 98, 0.16)
        textHighlight: "#d4b85a88"
plugins:
  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      defaultDateType: modified
      priority:
        - frontmatter
        - git
        - filesystem
    order: 10
  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: github-light
        dark: github-dark
      keepBackground: false
    order: 20
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      comments: true
      highlight: true
      wikilinks: true
      callouts: true
      mermaid: true
      parseTags: true
      parseArrows: true
      parseBlockReferences: true
      enableInHtmlEmbed: false
      enableYouTubeEmbed: true
      enableVideoEmbed: true
      enableCheckbox: true
    order: 30
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40
  - source: github:quartz-community/table-of-contents
    enabled: true
    order: 50
    layout:
      position: right
      priority: 30
  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: shortest
      disableBrokenWikilinks: true
    order: 60
  - source: github:quartz-community/description
    enabled: true
    order: 70
  - source: github:quartz-community/latex
    enabled: true
    options:
      renderEngine: katex
    order: 80
  - source: github:quartz-community/citations
    enabled: false
    order: 85
  - source: github:quartz-community/hard-line-breaks
    enabled: true
    order: 90
  - source: github:quartz-community/ox-hugo
    enabled: false
    order: 91
  - source: github:quartz-community/roam
    enabled: false
    order: 92
  - source: github:quartz-community/remove-draft
    enabled: true
  - source: github:quartz-community/explicit-publish
    enabled: false
  - source: github:quartz-community/unlisted-pages
    enabled: true
    options: {}
    order: 45
  - source: github:quartz-community/encrypted-pages
    enabled: true
    options:
      iterations: 600000
      passwordField: password
      unlistWhenEncrypted: true
      outputPath: static/encryptedContentIndex.json
  - source: github:quartz-community/stacked-pages
    enabled: true
    options:
      maxTabs: 8
      mobileBreakpoint: 800
      showSpines: true
      animateTransitions: true
    layout:
      position: afterBody
      priority: 50
      display: all
  - source: github:quartz-community/alias-redirects
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
  - source: github:quartz-community/favicon
    enabled: true
  - source: github:quartz-community/og-image
    enabled: true
  - source: github:quartz-community/cname
    enabled: true
  - source: github:quartz-community/canvas-page
    enabled: true
  - source: github:quartz-community/content-page
    enabled: true
  - source: github:quartz-community/folder-page
    enabled: true
  - source: github:quartz-community/tag-page
    enabled: true
  - source: github:quartz-community/explorer
    enabled: true
    options:
      title: Archives
      folderClickBehavior: collapse
      folderDefaultState: collapsed
      useSavedState: true
    layout:
      position: left
      priority: 50
  - source: github:quartz-community/graph
    enabled: false
    options:
      localGraph:
        depth: 2
        showTags: false
        removeTags:
          - draft
          - gm-only
      globalGraph:
        showTags: false
        removeTags:
          - draft
          - gm-only
    layout:
      position: right
      priority: 10
  - source: github:quartz-community/search
    enabled: true
    layout:
      position: left
      priority: 20
      group: toolbar
      groupOptions:
        grow: true
  - source: github:quartz-community/backlinks
    enabled: false
    layout:
      position: right
      priority: 50
  - source: github:quartz-community/article-title
    enabled: true
    layout:
      position: beforeBody
      priority: 10
  - source: github:quartz-community/content-meta
    enabled: true
    layout:
      position: beforeBody
      priority: 20
  - source: github:quartz-community/tag-list
    enabled: false
    layout:
      position: beforeBody
      priority: 30
  - source: github:quartz-community/page-title
    enabled: true
    layout:
      position: left
      priority: 10
  - source: github:quartz-community/darkmode
    enabled: true
    layout:
      position: left
      priority: 30
      group: toolbar
  - source: github:quartz-community/reader-mode
    enabled: true
    layout:
      position: left
      priority: 35
      group: toolbar
  - source: github:quartz-community/breadcrumbs
    enabled: true
    layout:
      position: beforeBody
      priority: 5
      condition: not-index
  - source: github:quartz-community/comments
    enabled: false
    options:
      provider: giscus
      options: {}
    layout:
      position: afterBody
      priority: 10
  - source: github:quartz-community/footer
    enabled: true
    options:
      links:
        The Choosing: /content/The-Choosing/The-Choosing-Overview
        Player Handouts: /content/Handouts/First-Night-at-the-Hall
        Rules: /content/Rules/Quick-Reference
        Locations: /content/World/Locations/00-Locations-Index
  - source: github:quartz-community/recent-notes
    enabled: true
    options:
      title: Recently Updated
      limit: 5
      showTags: true
      hideTagPages: true
      hideFolderPages: true
    layout:
      position: afterBody
      priority: 80
  - source: github:quartz-community/spacer
    enabled: true
    options: {}
    order: 25
    layout:
      position: left
      priority: 25
      display: mobile-only
  - source: github:quartz-community/bases-page
    enabled: true
    options: {}
    order: 50
  - source: github:quartz-community/note-properties
    enabled: true
    options:
      includeAll: false
      includedProperties: []
      excludedProperties: []
      hidePropertiesView: true
      delimiters: ---
      language: yaml
    order: 5
  - source: github:Requiae/quartz-leaflet-bases-plugin
    enabled: true
    options:
      enableCopyTool: false
    order: 50
  - source:
      name: quartz-themes
      repo: github:saberzero1/quartz-themes
      subdir: plugin
    enabled: false
    options:
      theme: its-theme
      variation: ttrpg-dnd
  - source: github:quartz-community/obsidian-plugin-excalidraw
    enabled: false
    options:
      enableInteraction: true
      darkMode: auto
      exportPadding: 20
    order: 50
layout:
  groups:
    toolbar:
      priority: 35
      direction: row
      gap: 0.5rem
  byPageType:
    "404":
      positions:
        beforeBody: []
        left: []
        right: []
    content: {}
    folder:
      exclude:
        - reader-mode
        - graph
      positions:
        right: []
    tag:
      exclude:
        - reader-mode
        - graph
      positions:
        right: []
    canvas: {}
    bases: {}
